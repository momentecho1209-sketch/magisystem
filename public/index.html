<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGI SYSTEM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Interstitial Ad Overlay -->
  <div id="interstitial" class="interstitial-overlay">
    <div class="interstitial-content">
      <div class="interstitial-header">NERV SECURITY CHECK</div>
      <div class="interstitial-ad-container" id="ad-container">
        <!-- Ad code injected here by JS -->
      </div>
      <button id="interstitial-close" class="interstitial-close-btn" disabled onclick="closeInterstitial()">
        <span id="interstitial-timer">5</span>
      </button>
    </div>
  </div>

  <div class="scanline"></div>

  <header>
    <div class="header-line"></div>
    <h1>MAGI SYSTEM</h1>
    <p class="subtitle">SUPER-COMPUTER SYSTEM &mdash; NERV</p>
    <div class="header-line"></div>
  </header>

  <main>
    <div class="input-section">
      <div class="input-label">INQUIRY INPUT</div>
      <div class="input-wrapper">
        <textarea id="question" rows="3" placeholder="質問を入力してください..."></textarea>
        <button id="submit" onclick="submitQuestion()">
          <span class="btn-text">EXECUTE</span>
        </button>
      </div>
    </div>

    <div class="magi-panels">
      <!-- CASPER - ChatGPT -->
      <div class="magi-panel" id="panel-casper" onclick="showDetail('casper')">
        <div class="panel-header">
          <span class="panel-number">01</span>
          <span class="panel-name">CASPER</span>
        </div>
        <div class="panel-ai">ChatGPT</div>
        <div class="panel-status" id="status-casper">STANDBY</div>
        <div class="panel-judgment" id="judgment-casper">&mdash;</div>
      </div>

      <!-- BALTHASAR - Gemini -->
      <div class="magi-panel" id="panel-balthasar" onclick="showDetail('balthasar')">
        <div class="panel-header">
          <span class="panel-number">02</span>
          <span class="panel-name">BALTHASAR</span>
        </div>
        <div class="panel-ai">Gemini</div>
        <div class="panel-status" id="status-balthasar">STANDBY</div>
        <div class="panel-judgment" id="judgment-balthasar">&mdash;</div>
      </div>

      <!-- MELCHIOR - Claude -->
      <div class="magi-panel" id="panel-melchior" onclick="showDetail('melchior')">
        <div class="panel-header">
          <span class="panel-number">03</span>
          <span class="panel-name">MELCHIOR</span>
        </div>
        <div class="panel-ai">Claude</div>
        <div class="panel-status" id="status-melchior">STANDBY</div>
        <div class="panel-judgment" id="judgment-melchior">&mdash;</div>
      </div>
    </div>

    <div class="result-bar" id="result-bar">
      <span id="result-text"></span>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <div class="modal-header" id="modal-header"></div>
      <div class="modal-body" id="modal-body"></div>
      <button class="modal-close" onclick="closeModal()">CLOSE</button>
    </div>
  </div>

  <footer>
    <span>MAGI SYSTEM ver.2026 &mdash; ARTIFICIAL EVOLUTION LABORATORY</span>
  </footer>
  
  <script src="https://pl28894781.effectivegatecpm.com/aa/0b/87/aa0b87ccd7ce76cd0b63f50e0966ec48.js"></script>
  <script src="https://pl28894761.effectivegatecpm.com/f7/dc/4f/f7dc4f26bf341887f640c4bdfc93742b.js"></script>

  <script>
    // Inject ad into interstitial modal
    (function() {
      var container = document.getElementById('ad-container');
      var script = document.createElement('script');
      script.src = 'https://pl28894781.effectivegatecpm.com/aa/0b/87/aa0b87ccd7ce76cd0b63f50e0966ec48.js';
      container.appendChild(script);

      // Countdown
      var seconds = 5;
      var timer = document.getElementById('interstitial-timer');
      var btn = document.getElementById('interstitial-close');
      var interval = setInterval(function() {
        seconds--;
        if (seconds > 0) {
          timer.textContent = seconds;
        } else {
          clearInterval(interval);
          timer.textContent = 'CLOSE';
          btn.disabled = false;
        }
      }, 1000);
    })();
    function closeInterstitial() {
      document.getElementById('interstitial').style.display = 'none';
    }
  </script>
  <script src="script.js"></script>

</body>
</html>
